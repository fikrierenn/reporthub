<svg width="120" height="40" viewBox="0 0 120 40" xmlns="http://www.w3.org/2000/svg">
  <!-- BKM Kitap Logo - Kırmızı Tema -->
  
  <!-- Arka plan -->
  <rect width="120" height="40" fill="transparent"/>
  
  <!-- BKM Metni -->
  <text x="10" y="28" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#dc2626">
    bkm
  </text>
  
  <!-- Kitap simgesi -->
  <g transform="translate(80, 8)">
    <!-- Kitap kapağı -->
    <rect x="0" y="0" width="16" height="20" fill="#dc2626" rx="1"/>
    <rect x="2" y="2" width="12" height="16" fill="#ffffff" rx="0.5"/>
    
    <!-- Kitap sayfaları -->
    <rect x="16" y="2" width="14" height="18" fill="#dc2626" rx="1"/>
    <rect x="18" y="4" width="10" height="14" fill="#ffffff" rx="0.5"/>
    
    <!-- Detay çizgileri -->
    <line x1="20" y1="7" x2="26" y2="7" stroke="#dc2626" stroke-width="0.5"/>
    <line x1="20" y1="9" x2="26" y2="9" stroke="#dc2626" stroke-width="0.5"/>
    <line x1="20" y1="11" x2="24" y2="11" stroke="#dc2626" stroke-width="0.5"/>
  </g>
</svg>